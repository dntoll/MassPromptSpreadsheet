<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API-nyckel</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; }
    label { display: block; margin-bottom: 4px; }
    input[type="password"] { width: 100%; padding: 6px; box-sizing: border-box; }
    button { margin-top: 10px; padding: 8px 14px; }
    .message { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <p>Ange API-nyckel och valfritt organisations-id för Mass Prompt. Sparas säkert i Script Properties.</p>
  <label for="apiKey">API-nyckel</label>
  <input type="password" id="apiKey" placeholder="Klistra in din API-nyckel" />
  <label for="orgId">Organisation (valfritt)</label>
  <input type="text" id="orgId" placeholder="t.ex. org-tsY..." />
  <button id="saveBtn">Spara</button>
  <div id="message" class="message"></div>

  <script>
    function showMessage(text, isError) {
      var el = document.getElementById('message');
      el.textContent = text;
      el.style.color = isError ? '#c00' : '#066';
    }

    window.onload = function() {
      google.script.run.withSuccessHandler(function(org) {
        if (org) document.getElementById('orgId').value = org;
      }).getOrgForSidebar();
    };

    document.getElementById('saveBtn').addEventListener('click', function() {
      var apiKey = document.getElementById('apiKey').value;
      var orgId = document.getElementById('orgId').value;
      if (!apiKey || apiKey.trim() === '') {
        showMessage('Ange en API-nyckel.', true);
        return;
      }
      google.script.run
        .withSuccessHandler(function() {
          showMessage('Sparat.');
        })
        .withFailureHandler(function(err) {
          showMessage('Fel: ' + (err.message || err), true);
        })
        .saveApiKey(apiKey, orgId);
    });
  </script>
</body>
</html>
